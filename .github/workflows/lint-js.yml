---
name: JS Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.css'
      - 'package.json'
      - 'package-lock.json'
      - 'biome.json'
      - 'tsconfig.json'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    uses: oszuidwest/.github-templates/.github/workflows/wp-js-ci.yml@v2
